<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导出报表 - 智能竞赛客服机器人</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h1>智能竞赛客服机器人后台</h1>
                <span class="role">管理员</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin" class="nav-item">仪表盘</a>
                <a href="/admin/pdf_manage.html" class="nav-item">文档管理</a>
                <a href="/admin/indexes_manage.html" class="nav-item">索引与图谱</a>
                <a href="/admin/tasks_manage.html" class="nav-item">任务控制台</a>
                <a href="/admin/logs_manage.html" class="nav-item">日志中心</a>
                <a href="/admin/question_manage.html" class="nav-item">对话历史</a>
                <a href="/admin/vector_manage.html" class="nav-item" data-require="admin">向量明细</a>
                <a href="/admin/graphrag_manage.html" class="nav-item" data-require="admin">图谱构建</a>
                <a href="/admin/settings_manage.html" class="nav-item" data-require="admin">系统配置</a>
                <a href="/admin/exports_manage.html" class="nav-item active" data-require="admin">导出报表</a>
                <a href="/admin/user_manage.html" class="nav-item" data-require="admin">用户权限</a>
            </nav>
            <div class="sidebar-footer">
                <a href="/volc-kb">返回问答</a> | <a href="#" id="logout">退出</a>
            </div>
        </aside>
        <main class="admin-main">
            <header class="admin-header">
                <h1>数据导出与报表</h1>
                <p>对话 CSV、文档清单 JSON、运行报表 JSON</p>
            </header>
            <div class="admin-content">
                <section class="card">
                    <h2>导出</h2>
                    <div class="admin-action-grid">
                        <button type="button" class="btn-primary" id="btnCsv">下载对话历史 CSV</button>
                        <button type="button" class="btn-primary" id="btnManifest">下载赛事文档清单 JSON</button>
                        <button type="button" class="btn-primary" id="btnGraph">下载 GraphRAG 实体与关系 JSON</button>
                        <button type="button" class="btn-primary" id="btnReport">拉取运行报表 JSON</button>
                    </div>
                    <p class="admin-hint">图谱导出自 GraphRAG storage 全表；默认去掉 embedding 列。若需向量可加参数 <code>include_embeddings=true</code>（体积很大）。</p>
                    <pre id="reportOut" class="admin-pre admin-pre--report">—</pre>
                </section>
            </div>
        </main>
    </div>
    <script src="/static/js/logger.js"></script>
    <script src="/static/js/axios.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/admin/common.js"></script>
    <script src="/static/js/admin/exports_manage.js"></script>
</body>
</html>
