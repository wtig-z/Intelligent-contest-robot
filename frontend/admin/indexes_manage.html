<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>索引与知识图谱 - 智能竞赛客服机器人</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h1>智能竞赛客服机器人后台</h1>
                <span class="role">管理员</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin" class="nav-item">仪表盘</a>
                <a href="/admin/pdf_manage.html" class="nav-item">文档管理</a>
                <a href="/admin/indexes_manage.html" class="nav-item active">索引与图谱</a>
                <a href="/admin/tasks_manage.html" class="nav-item">任务控制台</a>
                <a href="/admin/logs_manage.html" class="nav-item">日志中心</a>
                <a href="/admin/question_manage.html" class="nav-item">对话历史</a>
                <a href="/admin/vector_manage.html" class="nav-item" data-require="admin">向量明细</a>
                <a href="/admin/graphrag_manage.html" class="nav-item" data-require="admin">图谱构建</a>
                <a href="/admin/settings_manage.html" class="nav-item" data-require="admin">系统配置</a>
                <a href="/admin/exports_manage.html" class="nav-item" data-require="admin">导出报表</a>
                <a href="/admin/user_manage.html" class="nav-item" data-require="admin">用户权限</a>
            </nav>
            <div class="sidebar-footer">
                <a href="/volc-kb">返回问答</a> | <a href="#" id="logout">退出</a>
            </div>
        </aside>
        <main class="admin-main">
            <header class="admin-header">
                <h1>向量库与知识图谱</h1>
                <p>Vidorag 向量产物与 GraphRAG 统计、异常提示、重建入口</p>
            </header>
            <div class="admin-content">
                <section class="card">
                    <h2>总览</h2>
                    <pre id="idxSummary" class="admin-pre">加载中…</pre>
                    <div class="admin-toolbar-row" style="margin-top:12px;">
                        <button type="button" class="btn-primary" id="btnRefresh">刷新</button>
                        <button type="button" class="btn-primary" id="btnRebuildVec" data-require="uploader" style="display:none">重建向量管线</button>
                        <button type="button" class="btn-primary" id="btnRebuildGraph" data-require="admin" style="display:none">重建知识图谱</button>
                    </div>
                    <p class="admin-hint">「重建向量管线」触发 OCR + 向量入库脚本；「重建知识图谱」为 GraphRAG 全量构建（仅管理员）。</p>
                </section>
                <section class="card">
                    <h2>异常与未抽取文本</h2>
                    <pre id="idxAnomalies" class="admin-pre">—</pre>
                </section>
            </div>
        </main>
    </div>
    <script src="/static/js/logger.js"></script>
    <script src="/static/js/axios.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/admin/common.js"></script>
    <script src="/static/js/admin/indexes_manage.js"></script>
</body>
</html>
