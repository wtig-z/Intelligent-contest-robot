<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 智能竞赛客服机器人</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h1>智能竞赛客服机器人</h1>
            <h2>忘记密码</h2>
            <p class="auth-hint">填写注册时使用的手机号，提交后管理员将为您重置密码，并通过短信发送默认密码。请使用默认密码登录后立即修改为新密码。</p>
            <div id="formAlert" class="auth-alert" role="alert" aria-live="polite"></div>
            <form id="forgotForm">
                <input type="tel" id="phone" placeholder="手机号（11位）" required maxlength="11" pattern="[0-9]{11}" autocomplete="tel">
                <button type="submit">提交申请</button>
            </form>
            <p class="auth-link"><a href="/login">返回登录</a></p>
        </div>
    </div>
    <script src="/static/js/logger.js"></script>
    <script src="/static/js/axios.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value.trim();
            const alertEl = document.getElementById('formAlert');
            function showError(msg) {
                alertEl.textContent = msg || '提交失败';
                alertEl.className = 'auth-alert is-visible is-error';
            }
            function showSuccess(msg) {
                alertEl.textContent = msg || '已提交';
                alertEl.className = 'auth-alert is-visible is-success';
            }
            if (!phone || !/^1\d{10}$/.test(phone)) {
                showError('请填写有效的11位手机号');
                return;
            }
            const btn = this.querySelector('button');
            btn.disabled = true;
            try {
                const cli = window.axios.create({ baseURL: window.API_BASE || '', withCredentials: true, timeout: 30000 });
                const res = await cli.post('/api/auth/forgot-password', { phone });
                const data = res.data || {};
                if (data.code === 0) {
                    showSuccess(data.message || '已提交，请等待管理员处理，将通过短信通知您新密码。');
                    document.getElementById('phone').value = '';
                } else {
                    showError(data.message || '提交失败');
                }
            } catch (err) {
                showError((err && err.response && err.response.data && (err.response.data.message || err.response.data.error)) || ('请求失败: ' + (err.message || '')));
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
