<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 智能竞赛客服机器人</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h1>智能竞赛客服机器人</h1>
            <h2>修改密码</h2>
            <div id="formAlert" class="auth-alert" role="alert" aria-live="polite"></div>
            <form id="changeForm">
                <input type="password" id="oldPassword" placeholder="当前密码" required autocomplete="current-password">
                <input type="password" id="newPassword" placeholder="新密码（至少6位）" required minlength="6" autocomplete="new-password">
                <input type="password" id="newPassword2" placeholder="确认新密码" required minlength="6" autocomplete="new-password">
                <button type="submit">确认修改</button>
            </form>
            <p class="auth-link"><a href="/volc-kb">返回首页</a></p>
        </div>
    </div>
    <script src="/static/js/logger.js"></script>
    <script src="/static/js/axios.min.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        (function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login?next=' + encodeURIComponent('/change-password');
                return;
            }
        })();
        document.getElementById('changeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const newPassword2 = document.getElementById('newPassword2').value;
            const alertEl = document.getElementById('formAlert');
            function showError(msg) {
                alertEl.textContent = msg || '修改失败';
                alertEl.className = 'auth-alert is-visible is-error';
            }
            function showSuccess(msg) {
                alertEl.textContent = msg || '修改成功';
                alertEl.className = 'auth-alert is-visible is-success';
            }
            if (newPassword !== newPassword2) {
                showError('两次输入的新密码不一致');
                return;
            }
            if (newPassword.length < 6) {
                showError('新密码至少6位');
                return;
            }
            const btn = this.querySelector('button');
            btn.disabled = true;
            try {
                const cli = window.axios.create({
                    baseURL: window.API_BASE || '',
                    withCredentials: true,
                    timeout: 30000,
                    headers: getAuthHeaders(),
                });
                const res = await cli.post('/api/auth/change-password', { old_password: oldPassword, new_password: newPassword });
                const data = res.data || {};
                if (data.code === 0) {
                    showSuccess('密码已修改，即将跳转…');
                    setTimeout(function() {
                        window.location.href = '/volc-kb';
                    }, 1500);
                } else {
                    showError(data.message || '修改失败');
                    btn.disabled = false;
                }
            } catch (err) {
                showError((err && err.response && err.response.data && (err.response.data.message || err.response.data.error)) || ('请求失败: ' + (err.message || '')));
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
